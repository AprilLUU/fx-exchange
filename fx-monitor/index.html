<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FX Monitor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; padding: 2rem; }
    h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: #f8fafc; }
    .header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .badge {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.3rem 0.75rem; border-radius: 9999px; font-size: 0.8rem; font-weight: 600;
    }
    #health-badge { background: #1e293b; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #475569; }
    .dot.green { background: #22c55e; }
    .dot.red   { background: #ef4444; }
    #poll-count { color: #94a3b8; font-size: 0.85rem; }
    table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 0.5rem; overflow: hidden; }
    th { text-align: left; padding: 0.65rem 1rem; background: #0f172a; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #64748b; }
    td { padding: 0.65rem 1rem; border-top: 1px solid #0f172a; font-size: 0.9rem; }
    tr:hover td { background: #263047; }
    .rate { font-variant-numeric: tabular-nums; font-weight: 600; color: #38bdf8; }
    .date { color: #64748b; font-size: 0.8rem; }
    .accepting-section { margin-top: 1.5rem; padding: 1rem; background: #1e293b; border-radius: 0.5rem; }
    .accepting-section h2 { font-size: 1rem; margin-bottom: 0.75rem; color: #94a3b8; }
    .accepting-banner { font-size: 0.8rem; color: #f59e0b; margin-top: 0.5rem; }
    #toggle-btn {
      padding: 0.5rem 1.2rem; border: none; border-radius: 0.375rem; cursor: pointer;
      font-size: 0.9rem; font-weight: 600; background: #334155; color: #94a3b8;
    }
    #toggle-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #empty-msg { color: #475569; padding: 1rem; }
  </style>
</head>
<body>
  <h1>FX Monitor</h1>
  <div class="header">
    <div id="health-badge" class="badge">
      <span class="dot" id="health-dot"></span>
      <span id="health-text">checking…</span>
    </div>
    <span id="poll-count">polls: 0</span>
  </div>

  <table>
    <thead>
      <tr>
        <th>Pair</th>
        <th>Rate</th>
        <th>Date</th>
      </tr>
    </thead>
    <tbody id="rates-body">
      <tr><td colspan="3" id="empty-msg">Loading…</td></tr>
    </tbody>
  </table>

  <div class="accepting-section">
    <h2>Trade Accepting</h2>
    <button id="toggle-btn" disabled>ACCEPTING</button>
    <div class="accepting-banner" id="accepting-banner"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
